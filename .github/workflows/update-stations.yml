name: Update stations list

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 1 * *"   # Mondays 03:17 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest stations.json
        run: |
          mkdir -p data
          curl -fsSL \
            https://raw.githubusercontent.com/davwheat/uk-railway-stations/main/stations.json \
            -o data/stations.json

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "station-bot"
          git config user.email "station-bot@users.noreply.github.com"
          git add data/stations.json

          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi

          git commit -m "Update stations list"

          # Ensure we have the latest remote branch and rebase our commit on top of it
          git fetch origin ${{ github.ref_name }}
          git rebase origin/${{ github.ref_name }} || true

          # Push the commit to the same branch the workflow is running on
          git push origin HEAD:${{ github.ref_name }}
